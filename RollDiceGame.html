<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body
        {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
    }

    .container
    {
    width: 350px;
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.3);
    border: 2px solid rgba(255,255,255,0.2);
    }

    h1
    {
    color: white;
    margin-bottom: 10px;
    font-size: 38px;
    }

    .subtitle
    {
    color: #f1f1f1;
    font-size: 18px;
    margin-bottom: 25px;
    }

    #dice
    {
    font-size: 120px;
    margin: 20px 0;
    transition: 0.3s;
    }

    button
    {
    padding: 14px 30px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: #ff9800;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
    }

    button:hover
    {
    background: #e68900;
    transform: scale(1.05);
    }

    #result
    {
    margin-top: 25px;
    font-size: 28px;
    color: white;
    font-weight: bold;
    }

    </style>
</head>
<body>
        <div class = "container">

            <h1>
                🎲 Roll Dice Game
            </h1>

            <div id = "dice">
                🎲
            </div>

            <button onclick = "rollDice()">Roll Dice</button>

            <div id = "result">
                Click the button
            </div>

        </div>
</body>
    <script>
        function rollDice()
        {
        let randomNumber = Math.floor(Math.random() * 6) + 1;

        let diceFaces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

        document.getElementById("dice").innerHTML = 
        diceFaces[randomNumber - 1];

        document.getElementById("result").innerHTML =
        "Your Rolled: " + randomNumber; 
        }
    </script>

</html>
